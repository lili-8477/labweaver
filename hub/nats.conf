# claude-bioflow NATS — Core NATS only (no JetStream). The adapter uses
# request/reply + pub/sub; neither needs persistence.

listen: 0.0.0.0:4222
server_name: claude-bioflow-nats

websocket {
  host: 0.0.0.0
  port: 8080
  no_tls: true
  same_origin: false
  handshake_timeout: "2s"
  compression: true
}

# Connection limits.
max_connections: 1000
# File downloads (read_file for h5ad, figures, etc.) travel through RPC
# responses. 128MB covers most bioinfo artifacts; anything larger needs
# `docker cp` from the host.
max_payload: 128MB
max_pending: 256MB

# Keepalive — write_deadline prevents a slow frontend from wedging the server
# during fast streaming turns.
ping_interval: 120s
ping_max: 3
write_deadline: 10s

# Monitoring endpoint (healthcheck + debugging).
http_port: 8222
logtime: true
debug: false
trace: false
