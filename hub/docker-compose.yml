# claude-bioflow hub — shared infra (NATS + nginx). Per-user containers are
# added dynamically via scripts/add-user.sh, not declared here.
#
# Ports intentionally differ from the pantheon-hub stack so both can run on
# the same host during a dual-run parity test.

name: claude-bioflow

services:
  nats:
    image: nats:2.10-alpine
    container_name: claude-bioflow-nats
    command: -c /etc/nats/nats.conf
    ports:
      - "4223:4222"   # NATS client (external, optional)
      - "8081:8080"   # NATS WebSocket (proxied by nginx at /ws/)
      - "8223:8222"   # NATS monitoring
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - bioflow-net

  nginx:
    image: nginx:alpine
    container_name: claude-bioflow-nginx
    ports:
      - "8088:80"     # UI + /ws/ — fronted by Caddy (below) in prod
    volumes:
      # Build the frontend (`cd frontend && npm run build`) BEFORE bringing up
      # nginx. If the host dir doesn't exist, Docker auto-creates it as root
      # and the next `npm run build` fails with EACCES.
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./htpasswd:/etc/nginx/htpasswd:ro
      # Read-only access for the /download/ endpoint. Per-user scoped via
      # $remote_user in the location block; `.env` etc. are mode 0600 so
      # nginx (unprivileged) can't even read them as a secondary safety net.
      - ./workspaces:/downloads:ro
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bioflow-net

  caddy:
    image: caddy:2-alpine
    container_name: claude-bioflow-caddy
    ports:
      - "80:80"       # ACME HTTP-01 + HTTP→HTTPS redirect
      - "443:443"     # public TLS entrypoint for bioflow.selfai.cc
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - bioflow-net

  postgres:
    image: postgres:16-alpine
    container_name: claude-bioflow-postgres
    env_file: [ ./.env ]
    environment:
      POSTGRES_USER: bioflow
      POSTGRES_DB: bioflow
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bioflow"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - bioflow-net

  indexer:
    build: ./indexer
    container_name: claude-bioflow-indexer
    env_file: [ ./.env ]
    environment:
      PG_URL: "postgres://bioflow:${POSTGRES_PASSWORD}@postgres:5432/bioflow"
      WORKSPACES_ROOT: /workspaces
      MAX_CONCURRENT_FILES: "8"
      LOG_LEVEL: info
    volumes:
      - ./workspaces:/workspaces:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bioflow-net

networks:
  bioflow-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
